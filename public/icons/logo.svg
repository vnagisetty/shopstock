<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0D9488"/>
      <stop offset="100%" style="stop-color:#0F766E"/>
    </linearGradient>
    <linearGradient id="shine" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="200" height="200" rx="44" fill="url(#bg)"/>
  <rect width="200" height="200" rx="44" fill="url(#shine)"/>
  <!-- Price tag shape -->
  <g transform="translate(100,100)">
    <!-- Tag body -->
    <path d="M-32,-44 L24,-44 Q38,-44 44,-30 L44,24 Q44,38 34,44 L-10,44 Q-24,44 -32,34 L-54,8 Q-62,-4 -54,-16 L-32,-44 Z"
          fill="none" stroke="white" stroke-width="7" stroke-linejoin="round" stroke-linecap="round"/>
    <!-- Hole -->
    <circle cx="-18" cy="-28" r="6" fill="none" stroke="white" stroke-width="7"/>
    <!-- Tick / checkmark on tag -->
    <polyline points="-10,2 -2,12 16,-10"
              fill="none" stroke="white" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
</svg>
